<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Identity Verification</title>

    <!-- Console Bridge for React Native Debugging -->
    <script>
      (function () {
        var orig = {
          log: console.log,
          warn: console.warn,
          error: console.error,
        };
        function bridge(level, args) {
          orig[level].apply(console, args);
          if (window.ReactNativeWebView) {
            try {
              window.ReactNativeWebView.postMessage(
                JSON.stringify({
                  type: "log",
                  level: level,
                  message: Array.from(args).map(String).join(" "),
                }),
              );
            } catch (e) {}
          }
        }
        console.log = function () {
          bridge("log", arguments);
        };
        console.warn = function () {
          bridge("warn", arguments);
        };
        console.error = function () {
          bridge("error", arguments);
        };
      })();
    </script>

    <!-- Minimal Inline CSS to replace Tailwind CDN -->
    <style>
      /* Reset & Base */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background-color: #f8fafc;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
      }
      .tw-container {
        max-width: 28rem;
        width: 100%;
        background-color: #ffffff;
        border-radius: 1.5rem;
        box-shadow:
          0 20px 25px -5px rgba(0, 0, 0, 0.1),
          0 10px 10px -5px rgba(0, 0, 0, 0.04);
        padding: 2rem;
        text-align: center;
        position: relative;
        overflow: hidden;
      }
      .tw-title {
        font-size: 1.5rem;
        line-height: 2rem;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 0.5rem;
      }
      .tw-subtitle {
        color: #64748b;
        margin-bottom: 2rem;
        min-height: 24px;
      }
      .tw-hidden {
        display: none !important;
      }
      .tw-opacity-0 {
        opacity: 0;
      }
      .tw-transition {
        transition-property: opacity;
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        transition-duration: 300ms;
      }
      .tw-text-xs {
        font-size: 0.75rem;
        line-height: 1rem;
      }
      .tw-text-slate-400 {
        color: #94a3b8;
      }
      .tw-font-mono {
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
      }
      .tw-mt-6 {
        margin-top: 1.5rem;
      }
      .tw-text-4xl {
        font-size: 2.25rem;
        line-height: 2.5rem;
      }
      .tw-h-12 {
        height: 3rem;
      }
      .tw-w-full {
        width: 100%;
      }
      .tw-py-3 {
        padding-top: 0.75rem;
        padding-bottom: 0.75rem;
      }
      .tw-px-4 {
        padding-left: 1rem;
        padding-right: 1rem;
      }
      .tw-bg-slate-900 {
        background-color: #0f172a;
      }
      .tw-text-white {
        color: #ffffff;
      }
      .tw-rounded-xl {
        border-radius: 0.75rem;
      }
      .tw-font-semibold {
        font-weight: 600;
      }
      .tw-shadow-lg {
        box-shadow:
          0 10px 15px -3px rgba(0, 0, 0, 0.1),
          0 4px 6px -2px rgba(0, 0, 0, 0.05);
      }
      .tw-absolute {
        position: absolute;
      }
      .tw-top-4 {
        top: 1rem;
      }
      .tw-right-4 {
        right: 1rem;
      }
      .tw-bg-white-20 {
        background-color: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(12px);
      }
      .tw-p-2 {
        padding: 0.5rem;
      }
      .tw-rounded-full {
        border-radius: 9999px;
      }
      .tw-z-50 {
        z-index: 50;
      }
      button {
        cursor: pointer;
        border: none;
      }
    </style>

    <!-- MediaPipe Core Only (Injected by React Native locally) -->
    <!-- MEDIAPIPE_LOCAL_INJECT -->

    <!-- ONNX Runtime -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

    <style>
      @keyframes pulse-ring {
        0% {
          transform: scale(0.95);
          box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7);
        }
        70% {
          transform: scale(1);
          box-shadow: 0 0 0 20px rgba(99, 102, 241, 0);
        }
        100% {
          transform: scale(0.95);
          box-shadow: 0 0 0 0 rgba(99, 102, 241, 0);
        }
      }

      .camera-circle {
        position: relative;
        width: 320px;
        height: 320px;
        border-radius: 50%;
        overflow: hidden;
        border: 4px solid #e2e8f0;
        box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3);
        margin: 0 auto;
        background: #000;
      }

      .camera-circle.active {
        border-color: #6366f1;
        /* animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; */
      }

      .camera-circle.success {
        border-color: #22c55e;
        box-shadow: 0 0 0 8px rgba(34, 197, 94, 0.2);
      }

      .camera-circle.fail {
        border-color: #ef4444;
        box-shadow: 0 0 0 8px rgba(239, 68, 68, 0.2);
      }

      #output_canvas {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .mirror {
        transform: scaleX(-1);
      }

      /* Progress Bar */
      .progress-container {
        width: 200px;
        height: 6px;
        background: #e2e8f0;
        border-radius: 999px;
        margin: 20px auto;
        overflow: hidden;
      }

      /* Headless Mode Overrides */
      body.headless-mode {
        background-color: transparent !important;
      }
      body.headless-mode .tw-container {
        max-width: none !important;
        width: 100vw !important;
        height: 100vh !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        padding: 0 !important;
        background-color: transparent !important;
      }
      body.headless-mode .tw-title,
      body.headless-mode .tw-subtitle,
      body.headless-mode #ghost_face,
      body.headless-mode #arrow_left,
      body.headless-mode #arrow_right,
      body.headless-mode #progress_wrapper,
      body.headless-mode #feedback_icon,
      body.headless-mode #btn_retry,
      body.headless-mode #btn_flip {
        display: none !important;
      }
      body.headless-mode .camera-circle {
        width: 100vw !important;
        height: 100vh !important;
        border-radius: 0 !important;
        border: none !important;
        box-shadow: none !important;
        margin: 0 !important;
        position: absolute;
        top: 0;
        left: 0;
      }
      body.headless-mode #output_canvas {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .progress-bar {
        height: 100%;
        background: #6366f1;
        width: 0%;
        transition: width 0.3s ease;
      }

      /* Result Image */
      #captured_image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: none;
      }

      /* Visual Guidance */
      .ghost-face {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 180px;
        height: 240px;
        border: 2px dashed rgba(255, 255, 255, 0.4);
        border-radius: 50% 50% 40% 40%;
        pointer-events: none;
        transition: all 0.3s ease;
      }

      .ghost-face.active {
        border-color: #6366f1;
        border-style: solid;
        box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
      }

      .ghost-face.error {
        border-color: #ef4444;
        animation: pulse-error 1s infinite;
      }

      @keyframes pulse-error {
        0% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 1;
        }
        50% {
          transform: translate(-50%, -50%) scale(1.05);
          opacity: 0.6;
        }
        100% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 1;
        }
      }

      .guidance-arrow {
        position: absolute;
        top: 50%;
        font-size: 3rem;
        color: white;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
      }

      .arrow-left {
        left: 20px;
        transform: translateY(-50%);
        animation: bounce-left 1s infinite;
      }

      .arrow-right {
        right: 20px;
        transform: translateY(-50%);
        animation: bounce-right 1s infinite;
      }

      @keyframes bounce-left {
        0%,
        100% {
          transform: translate(0, -50%);
        }
        50% {
          transform: translate(-10px, -50%);
        }
      }

      @keyframes bounce-right {
        0%,
        100% {
          transform: translate(0, -50%);
        }
        50% {
          transform: translate(10px, -50%);
        }
      }
    </style>
  </head>
  <body
    class="tw-bg-slate-50 tw-min-h-screen tw-flex tw-items-center tw-justify-center tw-font-sans"
  >
    <div class="tw-container">
      <!-- Header -->
      <h2 class="tw-title">Liveness Check</h2>
      <p id="instruction_text" class="tw-subtitle">Initialize camera...</p>

      <!-- Camera Frame -->
      <div id="camera_wrapper" class="camera-circle">
        <video id="input_video" class="tw-hidden" playsinline></video>
        <canvas id="output_canvas"></canvas>

        <!-- Guidance Overlays -->
        <div id="ghost_face" class="ghost-face"></div>
        <div id="arrow_left" class="guidance-arrow arrow-left">⬅️</div>
        <div id="arrow_right" class="guidance-arrow arrow-right">➡️</div>
      </div>

      <!-- Progress -->
      <div id="progress_wrapper" class="tw-opacity-0 tw-transition">
        <div class="progress-container">
          <div id="progress_bar" class="progress-bar"></div>
        </div>
        <p class="tw-text-xs tw-text-slate-400 tw-font-mono">
          Analyzing Texture...
        </p>
      </div>

      <!-- Status Icons / Feedback -->
      <div id="feedback_icon" class="tw-mt-6 tw-text-4xl tw-h-12">
        <!-- Dynamic Icons: 😐 🙂 ⬅️ ➡️ ✅ ❌ -->
        📷
      </div>

      <!-- Retry Button (Hidden by default) -->
      <button
        id="btn_retry"
        onclick="retryLiveness()"
        class="tw-hidden tw-mt-6 tw-w-full tw-py-3 tw-px-4 tw-bg-slate-900 tw-text-white tw-rounded-xl tw-font-semibold tw-shadow-lg"
      >
        Try Again
      </button>

      <!-- Camera Toggle -->
      <button
        id="btn_flip"
        onclick="toggleCamera()"
        class="tw-absolute tw-top-4 tw-right-4 tw-bg-white-20 tw-p-2 tw-rounded-full tw-z-50"
      >
        🔄
      </button>
    </div>

    <!-- Scripts -->
    <script src="/static/js/onnx_antispoof.js"></script>
    <script src="/static/js/real_liveness.js"></script>
  </body>
</html>
